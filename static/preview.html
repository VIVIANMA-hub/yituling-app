<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一图灵 - 专家病例分享</title>
    <style>
        :root { --primary: #8B5CF6; --bg: #F5F3FF; --text: #1E293B; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; color: var(--text); }
        
        /* 顶部 Logo 对齐 App 风格 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: var(--text); }
        .tag { background: rgba(139, 92, 246, 0.1); color: var(--primary); font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: bold; }

        /* 病例卡片 */
        .case-card { background: #fff; border-radius: 24px; padding: 24px; box-shadow: 0 10px 30rpx rgba(139, 92, 246, 0.05); margin-bottom: 100px; }
        .user-info { display: flex; align-items: center; margin-bottom: 20px; }
        .avatar { width: 44px; height: 44px; background: var(--primary); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; position: relative; }
        .v-badge { position: absolute; right: -2px; bottom: -2px; width: 16px; height: 16px; background: #F59E0B; border: 2px solid #fff; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .meta { margin-left: 12px; }
        .name { font-size: 16px; font-weight: 800; display: block; }
        .title { font-size: 12px; color: var(--primary); opacity: 0.6; font-weight: bold; }

        .content { font-size: 15px; line-height: 1.6; margin-bottom: 20px; opacity: 0.9; }
        .case-img { width: 100%; border-radius: 16px; margin-bottom: 15px; display: block; }

        /* 底部吸底引导下载栏 */
        .download-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(139, 92, 246, 0.1); z-index: 100; }
        .dl-info { display: flex; flex-direction: column; }
        .dl-main { font-size: 14px; font-weight: 800; }
        .dl-sub { font-size: 11px; opacity: 0.5; font-weight: bold; }
        .dl-btn { background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 14px; text-decoration: none; font-size: 14px; font-weight: 800; box-shadow: 0 8px 15px rgba(139, 92, 246, 0.2); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">MEDTURING</div>
        <div class="tag">专业医师交流平台</div>
    </div>

    <div class="case-card">
        <div class="user-info">
            <div class="avatar">
                MT <div class="v-badge">V</div>
            </div>
            <div class="meta">
                <span class="name">专家 A</span>
                <span class="title">主任医师</span>
            </div>
        </div>
        <div class="content">
            这是一例典型的早期周围型肺癌影像表现。注意观察结节边缘的分叶征以及胸膜凹陷，AI 辅助分析提示恶性概率较高，建议尽快临床干预。
        </div>
        <img src="https://cdn.pixabay.com/photo/2014/12/10/21/01/x-ray-563603_1280.jpg" class="case-img" alt="影像资料">
        <div style="font-size: 12px; color: #94A3B8; text-align: center;">- 影像资料已进行脱敏处理 -</div>
    </div>

    <div class="download-bar">
        <div class="dl-info">
            <span class="dl-main">查看更多专家点评</span>
            <span class="dl-sub">下载一图灵 App，开启 AI 分析</span>
        </div>
        <a href="https://yituling.com/download" class="dl-btn">立即打开</a>
    </div>

</body>
</html>
